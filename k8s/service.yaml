apiVersion: v1
kind: Service
metadata:
  name: plant-health-service
  labels:
    app: plant-health-api # must match ServiceMonitor selector
spec:
  type: NodePort
  selector:
    app: plant-health-api
  ports:
    - name: http # named port — referenced in ServiceMonitor
      protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30080
