apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-health-api
  labels:
    app: plant-health-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plant-health-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0 # zero-downtime rolling update
  template:
    metadata:
      labels:
        app: plant-health-api
    spec:
      containers:
        - name: api
          image: anangwe/plant-health-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1500m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
