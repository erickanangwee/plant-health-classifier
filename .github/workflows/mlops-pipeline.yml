name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: plant-health-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint and unit tests (runs on every push and PR)
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint and test dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black
        run: black .

      - name: Run isort
        run: isort .

      #- name: Run flake8
      # run: flake8 .

      - name: Lint with flake8
        run: |
          flake8 src/ api/ tests/ \
            --extend-ignore=E501,E401,E541,E741,W503,E203,E402,E221,E241,E251,E127,E128,W292 \
            --exclude=__pycache__,venv

      - name: Verify schema imports
        run: |
          python -c "
          from api.schemas import PredictionResponse, HealthResponse, ClassesResponse
          print('All schemas import cleanly.')
          "

      - name: Run unit tests (all ML calls mocked)
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Full DVC training pipeline (main branch pushes only)
  # ─────────────────────────────────────────────────────────────────────────
  train:
    name: DVC Training Pipeline
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install training dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-train.txt

      - name: Configure DVC (local cache in CI runner)
        run: |
          mkdir -p /tmp/dvc-ci-cache
          dvc remote add -d ci-remote /tmp/dvc-ci-cache

      - name: Pull DVC cache (speeds up re-runs if data unchanged)
        run: dvc pull --run-cache || echo "No remote cache available — full run."

      - name: Patch MLflow tracking URI for CI (file-based SQLite)
        run: |
          sed -i 's|http://localhost:5000|sqlite:///mlruns.db|g' params.yaml

      - name: Run full DVC pipeline
        run: dvc repro

      - name: Push DVC artifacts to cache
        run: dvc push || echo "DVC push skipped (ephemeral CI runner)."

      - name: Upload champion model as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: champion-model-${{ github.sha }}
          path: |
            models/champion/
            models/evaluation/
          retention-days: 30

      - name: Write training summary to job summary
        run: |
          echo "## 🌿 Plant Health Classifier — Training Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat models/champion/champion_info.json >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build and push Docker image
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download champion model from previous job
        uses: actions/download-artifact@v4
        with:
          name: champion-model-${{ github.sha }}
          path: models/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image digest
        run: echo "Image pushed — digest ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Smoke test the published Docker image
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test Docker Image
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and start API container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker run -d \
            --name plant-api \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for API to be ready (max 120s)
        run: |
          echo "Waiting for API startup..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf http://localhost:8000/health \
                         -o /dev/null -w "%{http_code}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  API ready after $((i * 5))s"
              break
            fi
            echo "  Attempt $i/24 — HTTP $STATUS — waiting..."
            sleep 5
          done

      - name: Smoke test — /health endpoint
        run: |
          RESP=$(curl -sf http://localhost:8000/health)
          echo "Response: $RESP"
          python3 -c "
          import json, sys
          r = json.loads('$RESP')
          assert r['status'] == 'ok',          f'status={r[\"status\"]}'
          assert r['model_loaded'] is True,    'model_loaded is False'
          print('✓ /health smoke test passed')
          "

      - name: Smoke test — /classes endpoint
        run: |
          python3 -c "
          import urllib.request, json
          r = json.loads(urllib.request.urlopen('http://localhost:8000/classes').read())
          assert 'HEALTHY'  in r['classes'], 'HEALTHY missing'
          assert 'DISEASED' in r['classes'], 'DISEASED missing'
          print('✓ /classes smoke test passed')
          "

      - name: Smoke test — /predict endpoint
        run: |
          # Download a sample leaf image from Wikimedia
          curl -sL \
            "https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Late_blight_on_tomato_leaf_%287871756748%29.jpg/640px-Late_blight_on_tomato_leaf_%287871756748%29.jpg" \
            -o /tmp/test_leaf.jpg

          HTTP_CODE=$(curl -sf -o /tmp/predict_response.json \
            -w "%{http_code}" \
            -X POST http://localhost:8000/predict \
            -F "file=@/tmp/test_leaf.jpg" || echo "000")

          echo "HTTP code: $HTTP_CODE"
          echo "Response: $(cat /tmp/predict_response.json)"

          # Both 200 (predicted) and 422 (rejected by leaf guard) are valid.
          # Either means the API pipeline is running correctly.
          python3 -c "
          import json
          code = $HTTP_CODE
          assert code in (200, 422), f'Unexpected HTTP code: {code}'
          print(f'✓ /predict smoke test passed (HTTP {code})')
          "

      - name: Cleanup
        if: always()
        run: docker stop plant-api && docker rm plant-api || true
